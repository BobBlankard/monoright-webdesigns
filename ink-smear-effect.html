<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ink smear effect (archive) — Monoright hero</title>
    <!--
      INK SMEAR EFFECT — ARCHIVE / RESTORE GUIDE
      ============================================
      This file is a self-contained copy of the home hero “MONORIGHT” ink interaction
      (cursor-driven radial mask + SVG displacement smear on leave). Open this HTML
      in a browser to preview. To restore on the live site:

      1) index.html — Inside <section class="hero hero--home" …>, after
         <div class="hero--home__bg" …></div>, insert the <svg class="hero-home-filters">…</svg>
         block from the <section> below. Replace the simple wordmark <p> with the
         stack markup (wrap + base + bleed spans) from the same section.

      2) css/styles.css — After .hero--home__center { … }, add back the rules that were
         removed: .hero-home-filters, .hero--home__wordmark-wrap (cursor: default),
         .hero--home__wordmark-stack, .hero--home__wordmark-base, .hero--home__wordmark-bleed,
         the @media (hover: hover) bleed opacity rules, and @media (prefers-reduced-motion)
         for .hero--home__wordmark-bleed. Remove standalone-only .ink-archive-note if
         merging into the main stylesheet. Also remove color: #000000 from .hero--home__wordmark
         if the base layer again owns flat black (optional).

      3) js/main.js — Before the final `})();` of the main bundle, paste the
         `initHeroWordmarkInk` IIFE from the <script> at the bottom of this file
         (after syncLenisWithViewport();).

      Dependencies: none (vanilla JS). Requires hover + fine pointer; respects
      prefers-reduced-motion (effect skipped in main.js when reduce is on).
    -->
    <style>
      :root {
        --max: 72rem;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #e8e8e6;
        min-height: 100dvh;
      }

      .ink-archive-note {
        max-width: 40rem;
        margin: 0 auto;
        padding: 1rem 1.25rem;
        font-size: 0.875rem;
        line-height: 1.5;
        color: #333;
      }

      .ink-archive-note code {
        font-size: 0.8125rem;
      }

      /* ——— below: same hero / wordmark rules as monoright-web/css/styles.css (ink version) ——— */

      .hero.hero--home {
        position: relative;
        isolation: isolate;
        margin-inline: calc(50% - 50vw);
        width: 100vw;
        max-width: 100vw;
        padding: 0;
        text-align: center;
        color: #0a0a0a;
        color-scheme: light;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .hero--home__bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        background: #e8e8e6;
      }

      .hero--home__inner {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: var(--max);
        margin: 0 auto;
        min-height: min(70dvh, 40rem);
        padding: clamp(3.5rem, 8vw, 5rem) 1rem clamp(2rem, 5vw, 3rem);
        display: grid;
        grid-template-rows: 1fr auto;
        align-items: stretch;
        container-type: inline-size;
        container-name: hero-home;
        overflow-x: clip;
      }

      .hero--home__center {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        min-width: 0;
        width: 100%;
      }

      .hero-home-filters {
        position: absolute;
        width: 0;
        height: 0;
        overflow: hidden;
      }

      .hero--home__wordmark-wrap {
        position: relative;
        display: block;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        padding: clamp(1.75rem, 4vw, 3rem) 0 clamp(0.35rem, 1.2vw, 0.75rem);
        cursor: default;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .hero--home__wordmark-stack {
        --ink-mx: 50%;
        --ink-my: 42%;
        --ink-dwell: 0;
        position: relative;
        display: inline-block;
        max-width: 100%;
        isolation: isolate;
      }

      .hero--home__wordmark-base {
        position: relative;
        z-index: 1;
        display: block;
        color: #000000;
        opacity: calc(1 - 0.34 * var(--ink-dwell, 0));
        will-change: opacity;
      }

      .hero--home__wordmark-bleed {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        margin: 0;
        font: inherit;
        font-size: inherit;
        font-weight: inherit;
        letter-spacing: inherit;
        line-height: inherit;
        font-family: inherit;
        text-align: center;
        color: #030303;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease;
        will-change: filter;
        filter: url("#hero-ink-bleed");
        -webkit-mask-image: radial-gradient(
          ellipse calc(38% + 78% * var(--ink-dwell, 0)) calc(32% + 82% * var(--ink-dwell, 0)) at var(--ink-mx) var(--ink-my),
          rgba(0, 0, 0, 0.98) 0%,
          rgba(0, 0, 0, 0.55) calc(28% + 16% * var(--ink-dwell, 0)),
          rgba(0, 0, 0, 0.2) calc(52% + 14% * var(--ink-dwell, 0)),
          transparent calc(72% + 14% * var(--ink-dwell, 0))
        );
        mask-image: radial-gradient(
          ellipse calc(38% + 78% * var(--ink-dwell, 0)) calc(32% + 82% * var(--ink-dwell, 0)) at var(--ink-mx) var(--ink-my),
          rgba(0, 0, 0, 0.98) 0%,
          rgba(0, 0, 0, 0.55) calc(28% + 16% * var(--ink-dwell, 0)),
          rgba(0, 0, 0, 0.2) calc(52% + 14% * var(--ink-dwell, 0)),
          transparent calc(72% + 14% * var(--ink-dwell, 0))
        );
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
      }

      @media (hover: hover) and (pointer: fine) {
        .hero--home__wordmark-wrap:hover .hero--home__wordmark-bleed {
          opacity: calc(0.68 + 0.32 * var(--ink-dwell, 0));
        }

        .hero--home__wordmark-wrap.hero--home__wordmark--smearing:not(:hover) .hero--home__wordmark-bleed {
          opacity: 0.86;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero--home__wordmark-bleed {
          display: none;
        }
      }

      .hero--home__wordmark {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        box-sizing: border-box;
        text-align: center;
        font-family: "Helvetica Neue", HelveticaNeue, Helvetica, Arial, sans-serif;
        font-size: min(5.5rem, max(2rem, calc((100vw - 2.5rem) / 5.8)));
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        -webkit-font-smoothing: antialiased;
      }

      @supports (width: 1cqw) {
        .hero--home__wordmark {
          font-size: min(5.5rem, max(2rem, calc((100cqi - 1.25rem) / 5.8)));
        }
      }

      @media (min-width: 960px) {
        .hero--home__wordmark {
          letter-spacing: -0.03em;
          font-size: min(11.25rem, max(4.5rem, calc((min(100vw, var(--max)) - 2.75rem) / 5.6)));
        }
      }

      @supports (width: 1cqw) {
        @media (min-width: 960px) {
          .hero--home__wordmark {
            font-size: min(11.25rem, max(4.5rem, calc((100cqi - 2.75rem) / 5.6)));
          }
        }
      }
    </style>
  </head>
  <body>
    <p class="ink-archive-note">
      <strong>Ink smear effect</strong> — standalone archive for the Monoright home hero. Hover and move over
      <strong>MONORIGHT</strong>, then flick the pointer off the wordmark. See the HTML comment in the source for how to restore
      this into <code>index.html</code>, <code>css/styles.css</code>, and <code>js/main.js</code>.
    </p>

    <section class="hero hero--home" aria-label="Demo: ink wordmark">
      <div class="hero--home__bg" aria-hidden="true"></div>
      <svg class="hero-home-filters" aria-hidden="true" focusable="false" width="0" height="0">
        <defs>
          <filter id="hero-ink-bleed" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="4" seed="7" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" result="rippled" />
            <feGaussianBlur in="rippled" stdDeviation="0.55" result="blurred" />
            <feMorphology in="blurred" operator="dilate" radius="0.45" result="spread" />
          </filter>
        </defs>
      </svg>
      <div class="hero--home__inner">
        <div class="hero--home__center">
          <div class="hero--home__wordmark-wrap">
            <p class="hero--home__wordmark" aria-label="MONORIGHT">
              <span class="hero--home__wordmark-stack" aria-hidden="true">
                <span class="hero--home__wordmark-base">MONORIGHT</span>
                <span class="hero--home__wordmark-bleed">MONORIGHT</span>
              </span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
      (function initHeroWordmarkInk() {
        var wrap = document.querySelector(".hero--home__wordmark-wrap");
        var stack = document.querySelector(".hero--home__wordmark-stack");
        var filterRoot = document.querySelector("#hero-ink-bleed");
        var disp = filterRoot && filterRoot.querySelector("feDisplacementMap");
        var blurNode = filterRoot && filterRoot.querySelector("feGaussianBlur");
        var morphNode = filterRoot && filterRoot.querySelector("feMorphology");
        if (!wrap || !stack) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        if (!window.matchMedia("(hover: hover) and (pointer: fine)").matches) return;

        var curX = 50;
        var curY = 42;
        var targetX = 50;
        var targetY = 42;
        var curDwell = 0;
        var targetDwell = 0;
        var hoverEnteredAt = 0;
        var isHovering = false;
        var rafId = null;

        var lastClientX = 0;
        var lastClientY = 0;
        var lastMoveTime = 0;
        var velX = 0;
        var velY = 0;

        var smearMaskOxPx = 0;
        var smearMaskOyPx = 0;
        var smearVelX = 0;
        var smearVelY = 0;

        var prevTx = 50;
        var prevTy = 42;
        var lastPctDx = 0;
        var lastPctDy = 0;

        var holdInkAtPark = false;
        var parkTx = 50;
        var parkTy = 42;

        function clampPct(v) {
          if (v < 0) return 0;
          if (v > 100) return 100;
          return v;
        }

        function clampInkPct(v) {
          if (v < -14) return -14;
          if (v > 114) return 114;
          return v;
        }

        function tick(t) {
          var now = typeof t === "number" ? t : performance.now();
          if (isHovering) {
            targetDwell = Math.min(1, (now - hoverEnteredAt) / 3000);
          } else {
            targetDwell = 0;
          }

          curDwell += (targetDwell - curDwell) * 0.065;
          if (!isHovering && holdInkAtPark) {
            targetX = parkTx;
            targetY = parkTy;
          }
          curX += (targetX - curX) * 0.095;
          curY += (targetY - curY) * 0.095;

          if (isHovering) {
            smearMaskOxPx = 0;
            smearMaskOyPx = 0;
            smearVelX = 0;
            smearVelY = 0;
          } else {
            smearVelX *= 0.924;
            smearVelY *= 0.924;
            smearMaskOxPx += smearVelX;
            smearMaskOyPx += smearVelY;
            if (Math.hypot(smearVelX, smearVelY) < 0.042) {
              smearMaskOxPx *= 0.969;
              smearMaskOyPx *= 0.969;
            }
          }

          if (!isHovering && holdInkAtPark) {
            if (
              Math.hypot(smearVelX, smearVelY) < 0.022 &&
              Math.hypot(smearMaskOxPx, smearMaskOyPx) < 0.42
            ) {
              holdInkAtPark = false;
              targetX = 50;
              targetY = 42;
            }
          }

          var rect = stack.getBoundingClientRect();
          var mx = curX;
          var my = curY;
          if (rect.width > 0 && rect.height > 0) {
            mx = clampInkPct(curX + (smearMaskOxPx / rect.width) * 100);
            my = clampInkPct(curY + (smearMaskOyPx / rect.height) * 100);
          }

          stack.style.setProperty("--ink-mx", mx + "%");
          stack.style.setProperty("--ink-my", my + "%");
          stack.style.setProperty("--ink-dwell", curDwell.toFixed(4));

          var smearMag = Math.hypot(smearMaskOxPx, smearMaskOyPx);
          if (disp) {
            disp.setAttribute("scale", (11 + curDwell * 30 + Math.min(12, smearMag * 0.055)).toFixed(1));
          }
          if (blurNode) {
            blurNode.setAttribute("stdDeviation", (0.38 + curDwell * 1.85 + Math.min(0.65, smearMag * 0.004)).toFixed(2));
          }
          if (morphNode) {
            morphNode.setAttribute(
              "radius",
              (0.42 + curDwell * 3.2 + Math.min(1.6, smearMag * 0.008)).toFixed(2)
            );
          }

          var moving =
            Math.abs(targetX - curX) > 0.06 ||
            Math.abs(targetY - curY) > 0.06 ||
            Math.abs(targetDwell - curDwell) > 0.004;
          var smearing = smearMag > 0.9 || Math.hypot(smearVelX, smearVelY) > 0.045;
          if (smearing) {
            wrap.classList.add("hero--home__wordmark--smearing");
          } else {
            wrap.classList.remove("hero--home__wordmark--smearing");
          }
          if (isHovering || curDwell > 0.012 || moving || smearing) {
            rafId = window.requestAnimationFrame(tick);
          } else {
            rafId = null;
          }
        }

        function queueTick() {
          if (rafId == null) rafId = window.requestAnimationFrame(tick);
        }

        wrap.addEventListener("mouseenter", function () {
          isHovering = true;
          holdInkAtPark = false;
          hoverEnteredAt = performance.now();
          lastMoveTime = 0;
          velX = 0;
          velY = 0;
          smearMaskOxPx = 0;
          smearMaskOyPx = 0;
          smearVelX = 0;
          smearVelY = 0;
          prevTx = targetX;
          prevTy = targetY;
          lastPctDx = 0;
          lastPctDy = 0;
          queueTick();
        });

        wrap.addEventListener(
          "mousemove",
          function (e) {
            var rect = stack.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return;
            var t = performance.now();
            if (lastMoveTime > 0) {
              var dt = t - lastMoveTime;
              if (dt > 0 && dt < 90) {
                velX = (e.clientX - lastClientX) / dt;
                velY = (e.clientY - lastClientY) / dt;
              }
            }
            lastClientX = e.clientX;
            lastClientY = e.clientY;
            lastMoveTime = t;

            var newTx = clampPct(((e.clientX - rect.left) / rect.width) * 100);
            var newTy = clampPct(((e.clientY - rect.top) / rect.height) * 100);
            lastPctDx = newTx - prevTx;
            lastPctDy = newTy - prevTy;
            prevTx = newTx;
            prevTy = newTy;
            targetX = newTx;
            targetY = newTy;
            queueTick();
          },
          { passive: true }
        );

        wrap.addEventListener("mouseleave", function (e) {
          isHovering = false;
          parkTx = targetX;
          parkTy = targetY;

          var dirX = 0;
          var dirY = 1;
          var boost = 0;

          var mv = Math.hypot(e.movementX || 0, e.movementY || 0);
          if (mv > 1.2) {
            dirX = e.movementX / mv;
            dirY = e.movementY / mv;
            boost = Math.min(44, 16 + mv * 0.72);
          } else {
            var speed = Math.hypot(velX, velY);
            if (speed > 0.012) {
              dirX = velX / speed;
              dirY = velY / speed;
              boost = Math.min(44, 14 + speed * 720);
            } else {
              var lp = Math.hypot(lastPctDx, lastPctDy);
              if (lp > 0.035) {
                dirX = lastPctDx / lp;
                dirY = lastPctDy / lp;
                boost = Math.min(36, 11 + lp * 175);
              }
            }
          }

          if (boost > 0.5) {
            holdInkAtPark = true;
            targetX = parkTx;
            targetY = parkTy;
            smearVelX = dirX * boost;
            smearVelY = dirY * boost;
          } else {
            holdInkAtPark = false;
            smearVelX = 0;
            smearVelY = 0;
            targetX = 50;
            targetY = 42;
          }

          velX = 0;
          velY = 0;
          lastMoveTime = 0;
          queueTick();
        });
      })();
    </script>
  </body>
</html>
